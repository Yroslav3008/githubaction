name: Eleveth Workflow
on: [push]
env:
  WF_CUSTOM_VAR: 1
jobs:
  run-first-command:
    runs-on: ubuntu-latest
    env:
      JOB_CUSTOM_VAR: 1
    steps:
      - name: Set the Vars
        run: echo "NEW_CUSTOM_VAR=NEW VALUE" >> "$GITHUB_ENV"
      - name: Vars
        env:
          CUSTOM_VAR: STEP 1
          WF_CUSTOM_VAR: 2
        run: |
          echo $GITHUB_REF
          echo '${{ github.ref }}'
          echo $WF_CUSTOM_VAR
          echo $JOB_CUSTOM_VAR
          echo $NEW_CUSTOM_VAR