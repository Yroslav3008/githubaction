name: 14 workflow
on: workflow_dispatch

jobs:
  firs_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache node mod
        id: chache-step
        uses: actions/checkout@v3
        with: 
          path: ~/.npm
          key: "cache-file"
      - name: Display Cache
        run: echo '${{ toJSON(steps.chache-step.outputs) }}'
      - name: Install node_modules
        run: npm install