name: 15 workflow
on: push

jobs:
  first-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Math expression
        run: expr 2 + 2 > math-result.txt
      - name: Upload result 
        uses: actions/upload-artifact@v4
        with:
          name: math-result
          path: math-result.txt
  another_job:
    runs-on: ubuntu-latest
    needs: first-jobs
    steps:
      - name: download file
        uses: actions/download-artifact@v4
        with:
          name: math-result
      - name: Math Expression
        run: |
          value=`cat math-result.txt`
          expr $value \* 2 > math-result.txt
      - name: Upload result 
        uses: actions/upload-artifact@v4
        with:
          name: math-result
          path: math-result.txt
  second_job:
    runs-on: ubuntu-latest
    needs: another_job
    steps:
      - name: download file
        uses: actions/download-artifact@v4
        with:
          name: math-result
      - name: Print file
        run: |
          value=`cat math-result.txt`
          echo $value